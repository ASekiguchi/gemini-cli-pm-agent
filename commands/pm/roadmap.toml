description = "Generate a product roadmap — usage: /pm:roadmap owner/repo"

prompt = """
Generate a product roadmap for the repository specified in the arguments.

## Arguments
{{args}}

Parse the argument as "owner/repo" (e.g. "google-gemini/gemini-cli").
Extract owner and repo from it.

## Instructions

Call the following MCP tools:
1. `analyze_project_issues` with owner, repo, limit=100, state="open"
2. `analyze_commit_velocity` with owner, repo, months=3

Then generate a Now/Next/Later roadmap:

### Roadmap — [repo name]

1. Group open issues into strategic themes (core features, DX, performance, ecosystem, docs)
2. Use reactionCount and commentCount as proxies for user demand
3. Use commit velocity to calibrate timeline estimates

#### Now (In Progress / Next Sprint)
High-demand items with active discussion.

#### Next (1–2 months)
High-priority items with clear requirements.

#### Later (3–6 months)
Important but needs more planning or resources.

#### Exploring
Ideas under discussion, needs community input.

Present each section as a table:
| Theme | Issue(s) | Demand signal | Effort estimate | Rationale |

End with a note on confidence level given the data available.
"""
