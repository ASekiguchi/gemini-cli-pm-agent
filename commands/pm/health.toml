description = "Quick project health check - usage: /pm:health owner/repo"

prompt = """
Run a project health check for the repository specified in the arguments.

## Arguments
{{args}}

Parse the argument as "owner/repo" (e.g. "google-gemini/gemini-cli").
Extract owner and repo from it.

## Instructions

Use the `check_project_health` MCP tool directly. Do not use shell commands.

Call `check_project_health` with the extracted owner and repo.

If the tool returns dataErrors, partialData=true, or an error indicating that
GitHub data could not be fetched, do not infer project health from unavailable
data. Produce an "Environment Check Required" response with the failed metric,
the exact error message if available, and setup steps for `gh auth status`,
`gh auth login`, and retrying the command.

Then produce a health scorecard:

### Project Health Scorecard

| Metric | Value | Status |
|--------|-------|--------|
| Open Issues | N | OK / Warning / Critical |
| Issues Closed (30d) | N | ... |
| Open PRs | N | ... |
| PRs Merged (30d) | N | ... |
| Commit Velocity | trend | ... |
| Active Contributors | N | ... |

### Risk Flags
List any riskFlags returned by the tool. If empty, write "None detected."

### Quick Wins
3 specific actions that could improve project health immediately.

If any metrics show as null in the tool response, label them "data unavailable" rather than 0.
"""
