description = "Full PM analysis - usage: /pm:analyze owner/repo"

prompt = """
Run a full Product Management analysis for the repository specified in the arguments.

## Arguments
{{args}}

Parse the argument as "owner/repo" (e.g. "google-gemini/gemini-cli").
Extract owner and repo from it.

## Instructions

Use MCP tools directly. Do not use shell commands.

Call the following MCP tools in order:
1. `analyze_project_issues` with owner, repo, limit=50, state="open"
2. `analyze_project_issues` with owner, repo, limit=20, state="closed"
3. `analyze_commit_velocity` with owner, repo, months=3
4. `check_project_health` with owner, repo

If the MCP tools return dataErrors, partialData=true, or an error indicating
that GitHub data could not be fetched, stop the PM analysis. Do not produce
SWOT, RICE, roadmap, or priority recommendations from unavailable data.
Instead, produce an "Environment Check Required" response that includes:
1. the failed metric or tool,
2. the exact error message if available,
3. setup steps for `gh auth status`, `gh auth login`, and retrying the command.

Then produce a comprehensive PM analysis:

## Executive Summary
3-5 bullet points on project status.

## SWOT Analysis
Use the SWOT framework based on the data. Present as a 2x2 table.

## Top User Pain Points
Identify the top 5 pain points from open issues (by reactionCount and commentCount).

## Recommended Priorities (RICE Scored)
Apply RICE scoring to the top 10 open issues. Present as a ranked table:
| Rank | Issue | Title | Reach | Impact | Confidence | Effort | RICE Score |

RICE scores are heuristic estimates based on issue metadata and model judgment.
Use this exact ranking algorithm:
1. Score all candidate rows first.
2. Sort rows strictly by numeric RICE Score in descending order.
3. Assign the Rank column only after sorting.
4. For exact numeric ties only, sort by severity in this order: security,
   crash/data-loss, reliability, user-facing UX, maintenance, documentation.

Quality gate: before finalizing, scan the RICE Score column from top to bottom.
Each row must be less than or equal to the row above it. A sequence such as
2.8, 2.7, 3.6 is invalid and must be reordered. Never write a note claiming
that a non-tied row was moved because of severity.

If an item has low RICE but high security, reliability, or trust impact, flag it
as an override candidate in the explanation and Recommended Next Actions. If
you believe it truly deserves a higher rank, adjust Impact, Confidence, or
Effort before computing the score so the numeric RICE Score supports the rank.

For security-related issues, use cautious language such as "reported",
"potential", or "requires validation" unless the issue is confirmed by
maintainers.

## Velocity & Health Trends
Summarize commit velocity trends and risk flags from the health check.

## Recommended Next Actions
Numbered list of specific, actionable recommendations.

If any metrics show as null, label them "data unavailable" rather than 0.
"""
